name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created == 'true' || steps.release_after_merge.outputs.release_created == 'true' }}
      tag_name: ${{ steps.release_after_merge.outputs.tag_name || steps.release.outputs.tag_name }}
      major: ${{ steps.release_after_merge.outputs.major || steps.release.outputs.major }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Find release pull request
        id: release_pr
        env:
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          pr_number="$(
            jq -r \
              --arg base "${GITHUB_REF_NAME}" \
              --arg head "release-please--branches--main" \
              '.[] | select(.baseBranchName == $base and .headBranchName == $head) | .number' \
              <<< "${RELEASE_PRS:-[]}" |
            head -n 1
          )"

          echo "number=${pr_number}" >> "${GITHUB_OUTPUT}"

      - name: Merge release pull request
        if: ${{ steps.release_pr.outputs.number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5 6; do
            if gh pr merge "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --squash --delete-branch; then
              exit 0
            fi

            echo "release PR merge attempt ${attempt} failed, retrying"
            sleep 10
          done

          exit 1

      # GITHUB_TOKEN merges do not trigger a follow-up push workflow, so create
      # the release in this same run after the generated PR lands.
      - name: Create release after automated merge
        id: release_after_merge
        if: ${{ steps.release_pr.outputs.number != '' }}
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  update-major-tag:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - name: Update major version tag
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          MAJOR: ${{ needs.release-please.outputs.major }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          git tag -fa "v${MAJOR}" "${TAG}" -m "Update v${MAJOR} to ${TAG}"
          git push origin "v${MAJOR}" --force
